<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScreenStory — Character Lock Screen Maker</title>
  <style>
    :root {
      --paper: #f6f5f2;
      --ink: #171717;
      --muted: #706b65;
      --line: #e3ddd6;
      --apple: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
      --phone-w: 430px;
      --phone-h: 932px;
    }

    * { box-sizing: border-box; }
    html { background: var(--paper); }
    body { margin: 0; color: var(--ink); background: var(--paper); font-family: var(--apple); }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    input[type="range"] { accent-color: #151515; }

    .app-shell { width: min(1280px, calc(100% - 42px)); margin: 0 auto; padding: 40px 0 84px; }
    .page-header { display: flex; align-items: end; justify-content: space-between; gap: 20px; padding-bottom: 25px; border-bottom: 1px solid #d8d2ca; }
    .eyebrow { margin: 0 0 8px; color: #756e67; letter-spacing: .16em; font: 700 11px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; }
    h1 { margin: 0; letter-spacing: -.06em; font: 500 clamp(42px, 5vw, 67px)/.92 Georgia, "Times New Roman", serif; }
    .save-button { border: 0; border-radius: 999px; padding: 14px 21px; background: #191715; color: #fff; font-weight: 750; box-shadow: 0 10px 25px rgba(0,0,0,.16); }
    .save-button:active { transform: translateY(1px); }

    .workspace { display: grid; grid-template-columns: minmax(310px, 470px) minmax(460px, 1fr); gap: clamp(42px, 8vw, 110px); align-items: start; padding-top: 36px; }
    .controls { padding: 8px 22px; border: 1px solid #ece7e1; border-radius: 25px; background: rgba(255,255,255,.82); box-shadow: 0 18px 48px rgba(43,35,29,.06); }
    .panel-section { padding: 23px 0 26px; border-bottom: 1px solid var(--line); }
    .panel-section:last-child { border-bottom: 0; }
    .section-heading { display: flex; gap: 10px; align-items: center; }
    .section-index { color: #9d938a; font: 700 11px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .section-heading h2 { margin: 0; font-size: 16px; letter-spacing: -.03em; }
    .round-add { width: 29px; height: 29px; margin-left: auto; border: 1px solid #d9d2ca; border-radius: 50%; background: #fff; color: #514a44; font-size: 20px; line-height: 1; }
    .section-help { margin: 11px 0 5px; color: var(--muted); font-size: 12px; line-height: 1.5; }

    label { display: grid; gap: 7px; margin-top: 13px; color: #4d4741; font-size: 12px; font-weight: 700; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
    input, select, textarea { width: 100%; border: 1px solid #ded8d0; border-radius: 13px; padding: 11px 12px; background: #fff; color: #1d1b19; outline: none; }
    textarea { min-height: 76px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: #999087; box-shadow: 0 0 0 3px rgba(70,60,50,.08); }
    .upload-button, .subtle-button { display: inline-flex; align-items: center; justify-content: center; min-height: 45px; border: 1px dashed #d4cdc5; border-radius: 13px; background: #fff; color: #4a443f; font-size: 13px; font-weight: 700; }
    .upload-button input { display: none; }
    .button-row { display: flex; gap: 9px; margin-top: 12px; }
    .subtle-button { padding: 0 13px; border-style: solid; }
    .subtle-button.danger { color: #a84242; border-color: #ebcccc; }
    .credit-block.hidden, .position-block.hidden { display: none; }
    .inline-note { color: #908780; font-size: 11px; line-height: 1.45; }

    .notification-editor { margin-top: 14px; padding: 15px; border: 1px solid #ebe5de; border-radius: 17px; background: #fff; }
    .notification-editor-header { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 800; }
    .notification-editor .delete-button { border: 0; background: transparent; color: #a44f4f; padding: 0; font-size: 12px; text-decoration: underline; }

    .preview-column { min-width: 0; display: grid; justify-items: center; }
    .preview-label { width: min(100%, 430px); margin: 0 0 13px; color: #766e67; letter-spacing: .14em; font: 700 11px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .phone-frame { width: var(--phone-w); height: var(--phone-h); padding: 10px; border-radius: 64px; background: linear-gradient(145deg, #222324, #070707 60%, #222); box-shadow: 0 25px 58px rgba(0,0,0,.24); }
    .phone { position: relative; width: 100%; height: 100%; overflow: hidden; border-radius: 55px; background: #1a1a1c; color: #fff; }

    /* Wallpaper stays as a real image element so the preview and PNG crop match. */
    .wallpaper-stage { position: absolute; inset: 0; overflow: hidden; background: linear-gradient(145deg, #252831, #151518); touch-action: none; cursor: grab; }
    .wallpaper-stage.dragging { cursor: grabbing; }
    #wallpaperImage { position: absolute; display: none; max-width: none; user-select: none; pointer-events: none; }
    .wallpaper-shade { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.14), rgba(0,0,0,.04) 44%, rgba(0,0,0,.26)); pointer-events: none; }

    .status-row { position: absolute; z-index: 10; top: 21px; left: 26px; right: 25px; display: flex; align-items: center; justify-content: space-between; min-height: 34px; pointer-events: none; }
    .credit-text { width: 118px; overflow: hidden; color: rgba(255,255,255,.96); text-overflow: ellipsis; white-space: nowrap; font-size: 13px; font-weight: 800; letter-spacing: -.03em; text-shadow: 0 1px 5px rgba(0,0,0,.32); }
    .dynamic-island { position: absolute; top: 16px; left: 50%; z-index: 11; width: 194px; height: 58px; transform: translateX(-50%); border-radius: 34px; background: #000; display: grid; place-items: center; }
    .lock-icon { width: 18px; height: 22px; }
    .status-icons { display: flex; align-items: center; gap: 9px; margin-left: auto; min-width: 98px; justify-content: flex-end; }
    .signal-bars { display: inline-flex; align-items: flex-end; gap: 3px; width: 27px; height: 21px; filter: drop-shadow(0 1px 3px rgba(0,0,0,.3)); }
    .signal-bars i { display: block; width: 4px; border-radius: 3px 3px 1px 1px; background: #fff; }
    .signal-bars i:nth-child(1) { height: 6px; }
    .signal-bars i:nth-child(2) { height: 10px; }
    .signal-bars i:nth-child(3) { height: 15px; }
    .signal-bars i:nth-child(4) { height: 20px; }
    .status-icons svg { display: block; width: 27px; height: 20px; flex: 0 0 auto; filter: drop-shadow(0 1px 3px rgba(0,0,0,.3)); }
    .status-icons .battery-svg { width: 34px; }

    .clock-block { position: absolute; z-index: 6; top: 122px; left: 20px; right: 20px; text-align: center; pointer-events: none; text-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .date-text { margin-bottom: 7px; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Apple SD Gothic Neo", sans-serif; font-size: 23px; font-weight: 500; letter-spacing: -.055em; }
    .time-text { color: #fff; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Apple SD Gothic Neo", sans-serif; font-size: 112px; font-weight: 500; letter-spacing: -.095em; line-height: .92; transform: translateX(-5px); }

    .layer { position: absolute; left: 22px; right: 22px; z-index: 7; touch-action: none; }
    #notificationLayer { top: 536px; }
    #albumLayer { top: 306px; display: none; }
    #playerLayer { top: 567px; display: none; }
    .draggable-layer { cursor: grab; }
    .draggable-layer.dragging { cursor: grabbing; }

    .notification-list { display: flex; flex-direction: column; gap: 12px; }
    .notification-stack { position: relative; min-height: 106px; }
    .stack-back { position: absolute; left: calc(var(--depth) * 7px); right: calc(var(--depth) * 7px); top: calc(var(--depth) * 7px); height: 106px; border-radius: 25px; background: rgba(232,239,255,.32); border: 1px solid rgba(255,255,255,.28); }
    .notification-card { position: relative; z-index: 2; min-height: 106px; display: grid; grid-template-columns: 53px minmax(0, 1fr) auto; align-items: center; column-gap: 12px; padding: 14px 17px; border-radius: 25px; color: #fff; background: linear-gradient(130deg, rgba(236,242,255,.62), rgba(181,194,235,.38)); border: 1px solid rgba(255,255,255,.55); box-shadow: 0 10px 22px rgba(0,0,0,.16); }
    .app-icon-holder { width: 53px; height: 53px; display: grid; place-items: center; align-self: center; }
    .app-icon, .app-icon-holder > img { display: grid; place-items: center; width: 53px; height: 53px; border-radius: 15px; overflow: hidden; object-fit: cover; box-shadow: 0 1px 1px rgba(0,0,0,.08); }
    .notification-meta { min-width: 0; align-self: center; }
    .notification-app-name { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,.84); font-size: 13px; font-weight: 750; line-height: 1.1; }
    .notification-count { padding: 2px 6px; border-radius: 9px; background: rgba(0,0,0,.18); color: #fff; font-size: 11px; }
    .notification-title { overflow: hidden; color: #fff; text-overflow: ellipsis; white-space: nowrap; font-size: 19px; font-weight: 820; letter-spacing: -.05em; line-height: 1.25; }
    .notification-message { overflow: hidden; color: rgba(255,255,255,.92); text-overflow: ellipsis; white-space: nowrap; font-size: 16px; line-height: 1.3; letter-spacing: -.04em; }
    .notification-time { align-self: start; padding-top: 1px; color: rgba(255,255,255,.82); font-size: 14px; font-weight: 700; white-space: nowrap; }

    .album-art { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; border-radius: 27px; background: linear-gradient(135deg, #7b83bf, #272941 58%, #14151c); box-shadow: 0 13px 28px rgba(0,0,0,.25); }
    .album-art img { display: none; width: 100%; height: 100%; object-fit: cover; }
    .music-player { width: 100%; padding: 16px 18px 15px; border-radius: 26px; background: linear-gradient(130deg, rgba(35,39,59,.82), rgba(56,62,91,.72)); border: 1px solid rgba(255,255,255,.36); box-shadow: 0 12px 23px rgba(0,0,0,.2); }
    .music-row { display: grid; grid-template-columns: 58px minmax(0,1fr); gap: 12px; align-items: center; }
    .mini-cover { width: 58px; height: 58px; border-radius: 12px; overflow: hidden; background: linear-gradient(140deg, #7d72af, #e4cdf7); }
    .mini-cover img { display: none; width: 100%; height: 100%; object-fit: cover; }
    .music-title { overflow: hidden; color: #fff; text-overflow: ellipsis; white-space: nowrap; font-size: 20px; font-weight: 800; letter-spacing: -.055em; }
    .music-artist { overflow: hidden; color: rgba(255,255,255,.72); text-overflow: ellipsis; white-space: nowrap; font-size: 16px; font-weight: 650; letter-spacing: -.04em; }
    .progress-row { display: grid; grid-template-columns: 38px 1fr 38px; gap: 8px; align-items: center; margin-top: 16px; color: rgba(255,255,255,.76); font-size: 12px; }
    .progress-track { height: 5px; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,.27); }
    .progress-fill { height: 100%; border-radius: inherit; background: rgba(255,255,255,.9); }
    .music-controls { display: grid; grid-template-columns: 38px 1fr 1fr 1fr 38px; gap: 7px; align-items: center; margin-top: 17px; color: #fff; }
    .music-controls span { text-align: center; font-size: 36px; line-height: 1; font-family: Arial, sans-serif; }
    .music-controls .small { color: rgba(255,255,255,.7); font-size: 31px; }
    .music-controls .pause { font-size: 40px; letter-spacing: -.18em; transform: translateX(-4px); }

    .quick-actions { position: absolute; z-index: 9; bottom: 27px; left: 42px; right: 42px; display: flex; align-items: end; justify-content: space-between; pointer-events: none; }
    .quick-button { width: 64px; height: 64px; display: grid; place-items: center; border-radius: 50%; background: rgba(24,24,25,.57); box-shadow: inset 0 0 0 1px rgba(255,255,255,.11); }
    .quick-button svg { width: 33px; height: 33px; }
    .home-indicator { position: absolute; z-index: 9; bottom: 13px; left: 50%; width: 125px; height: 5px; transform: translateX(-50%); border-radius: 999px; background: rgba(255,255,255,.96); }

    .exporting .phone { border-radius: 55px; }
    .exporting .notification-card, .exporting .music-player { box-shadow: 0 8px 20px rgba(0,0,0,.18); }

    @media (max-width: 980px) {
      .workspace { grid-template-columns: 1fr; }
      .preview-column { justify-items: start; }
    }
    @media (max-width: 540px) {
      .app-shell { width: min(100% - 24px, 1280px); padding-top: 22px; }
      .page-header { align-items: flex-start; flex-direction: column; }
      .phone-frame { transform-origin: top left; transform: scale(.78); margin-bottom: calc(var(--phone-h) * -.22); }
      .preview-label { width: 335px; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="page-header">
      <div>
        <p class="eyebrow">FICTIONAL PHONE MAKER · LOCK SCREEN</p>
        <h1>ScreenStory</h1>
      </div>
      <button class="save-button" id="savePng" type="button">PNG 저장</button>
    </header>

    <section class="workspace">
      <aside class="controls">
        <section class="panel-section">
          <div class="section-heading"><span class="section-index">01</span><h2>배경화면</h2></div>
          <p class="section-help">이미지를 올린 뒤 폰의 빈 배경 부분을 드래그하면 화면에서 보이는 위치와 잘리는 부분을 조정할 수 있어.</p>
          <label class="upload-button">배경 이미지 업로드<input id="wallpaperInput" type="file" accept="image/*" /></label>
          <div class="button-row"><button class="subtle-button" id="resetCrop" type="button">배경 위치 초기화</button></div>
        </section>

        <section class="panel-section">
          <div class="section-heading"><span class="section-index">02</span><h2>기본 정보</h2></div>
          <div class="two-col">
            <label>시<input id="hourInput" type="number" min="0" max="23" value="7" /></label>
            <label>분<input id="minuteInput" type="number" min="0" max="59" value="44" /></label>
          </div>
          <label>날짜<input id="dateInput" type="date" value="2026-07-06" /></label>
          <label>배터리 <span id="batteryValue">83%</span><input id="batteryInput" type="range" min="0" max="100" value="83" /></label>
          <div class="button-row"><button class="subtle-button" id="addCredit" type="button">＋ 커미션주 추가</button></div>
          <div class="credit-block hidden" id="creditBlock">
            <label>커미션주 / 일러스트레이터<input id="creditInput" type="text" placeholder="@artistname" /></label>
            <label>표시 방식<select id="creditPrefix"><option value="illust. ">illust. @artistname</option><option value="art by ">art by @artistname</option><option value="">이름만 표시</option></select></label>
            <div class="button-row"><button class="subtle-button danger" id="removeCredit" type="button">표기 지우기</button></div>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-heading"><span class="section-index">03</span><h2>알림</h2><button class="round-add" id="addNotification" type="button" aria-label="알림 추가">＋</button></div>
          <label>같은 앱 알림 표시 방식<select id="notificationMode"><option value="separate">각각 표시</option><option value="stack">겹쳐서 묶기</option></select></label>
          <label>알림 위치 <span id="notificationPositionText">아래쪽</span><input id="notificationPosition" type="range" min="250" max="710" value="536" /></label>
          <p class="section-help">미리보기의 알림 카드 영역을 직접 위아래로 드래그할 수도 있어.</p>
          <div id="notificationEditors"></div>
        </section>

        <section class="panel-section">
          <div class="section-heading"><span class="section-index">04</span><h2>음악 재생 화면</h2></div>
          <label>표시 방식<select id="musicMode"><option value="none">표시 안 함</option><option value="mini">아래쪽 플레이어만</option><option value="full">앨범 커버 + 플레이어</option></select></label>
          <label class="upload-button">앨범 커버 업로드<input id="albumInput" type="file" accept="image/*" /></label>
          <label>곡 제목<input id="songTitle" type="text" value="낭만 한도 초과" /></label>
          <label>아티스트<input id="songArtist" type="text" value="하이키" /></label>
          <div class="two-col"><label>현재 시간<input id="songElapsed" type="text" value="1:08" /></label><label>남은 시간<input id="songRemaining" type="text" value="−2:34" /></label></div>
          <label>재생 진행률<input id="songProgress" type="range" min="0" max="100" value="37" /></label>
          <div id="miniPositionBlock" class="position-block hidden"><label>플레이어 위치 <span id="miniPositionText">중간</span><input id="miniPosition" type="range" min="180" max="730" value="560" /></label></div>
          <div id="fullPositionBlock" class="position-block hidden"><label>앨범 커버 위치 <span id="albumPositionText">중간</span><input id="albumPosition" type="range" min="190" max="520" value="292" /></label><label>플레이어 위치 <span id="fullPlayerPositionText">아래쪽</span><input id="fullPlayerPosition" type="range" min="420" max="760" value="590" /></label></div>
          <p class="section-help">앨범 커버와 플레이어는 미리보기에서 각각 직접 드래그해서 이동할 수 있어.</p>
        </section>
      </aside>

      <section class="preview-column">
        <p class="preview-label">LIVE PREVIEW</p>
        <div class="phone-frame">
          <div class="phone" id="phone">
            <div class="wallpaper-stage" id="wallpaperStage"><img id="wallpaperImage" alt="" /><div class="wallpaper-shade"></div></div>

            <div class="status-row"><div class="credit-text" id="creditText"></div><div class="status-icons" aria-hidden="true">
              <span class="signal-bars"><i></i><i></i><i></i><i></i></span>
              <svg class="wifi-svg" viewBox="0 0 28 20"><path d="M2 7.5C8.9.6 19.1.6 26 7.5" fill="none" stroke="white" stroke-width="2.7" stroke-linecap="round"/><path d="M6 11.5c4.7-4.6 11.3-4.6 16 0" fill="none" stroke="white" stroke-width="2.7" stroke-linecap="round"/><circle cx="14" cy="16" r="2" fill="white"/></svg>
              <svg class="battery-svg" viewBox="0 0 36 20"><rect x="1" y="2" width="29" height="16" rx="4" fill="none" stroke="white" stroke-width="2.4"/><rect x="4" y="5" width="20" height="10" rx="2" fill="white" id="batteryFill"/><rect x="32" y="7" width="3" height="6" rx="1" fill="white"/></svg>
            </div></div>
            <div class="dynamic-island"><svg class="lock-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="6.4" y="10.4" width="11.2" height="9.3" rx="2" fill="none" stroke="white" stroke-width="1.8"/><path d="M8.7 10.4V7.5a3.3 3.3 0 0 1 6.6 0v2.9" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></div>
            <div class="clock-block"><div class="date-text" id="dateText"></div><div class="time-text" id="timeText"></div></div>

            <div class="layer draggable-layer" id="notificationLayer"><div class="notification-list" id="notificationList"></div></div>
            <div class="layer draggable-layer" id="albumLayer"><div class="album-art"><img id="albumArtImage" alt="" /></div></div>
            <div class="layer draggable-layer" id="playerLayer"></div>

            <div class="quick-actions" aria-hidden="true"><div class="quick-button"><svg viewBox="0 0 24 24" fill="none"><path d="M8.4 3.2h7.2l-.7 5.2H9.1L8.4 3.2Z" fill="white"/><path d="M10.1 10.1h3.8l.4 8.9h-4.6l.4-8.9Z" fill="white"/><path d="M9.7 19.1h4.6" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="quick-button"><svg viewBox="0 0 26 26" fill="none"><rect x="3" y="7" width="20" height="14" rx="3" fill="white"/><path d="M8 7 9.5 4h7L18 7" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="13" cy="14" r="4" fill="#202020"/><circle cx="13" cy="14" r="2.2" fill="white"/></svg></div></div>
            <div class="home-indicator"></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <template id="notificationTemplate">
    <div class="notification-editor">
      <div class="notification-editor-header"><span>알림 <span class="editor-index"></span></span><button type="button" class="delete-button">삭제</button></div>
      <label>앱<select class="n-app"><option value="kakao">카카오톡</option><option value="instagram">Instagram</option><option value="discord">Discord</option><option value="messages">메시지</option><option value="phone">전화</option><option value="x">X</option></select></label>
      <label>보낸 사람 / 채널<input class="n-sender" type="text" placeholder="이자헌" /></label>
      <label>내용<textarea class="n-message" placeholder="주무십니까?"></textarea></label>
      <label>표시 시간<input class="n-time" type="text" value="지금" /></label>
      <label class="upload-button">커스텀 앱 아이콘<input class="n-icon" type="file" accept="image/*" /></label>
    </div>
  </template>

  <script src="html2canvas.min.js"></script>
  <script>
    (() => {
      const PHONE_W = 410;
      const PHONE_H = 912;
      const $ = (selector, root = document) => root.querySelector(selector);
      const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
      const state = {
        wallpaperSrc: '', wallpaperX: 0, wallpaperY: 0, wallpaperW: 0, wallpaperH: 0,
        hour: 7, minute: 44, date: '2026-07-06', battery: 83,
        creditEnabled: false, credit: '', creditPrefix: 'illust. ',
        notifications: [], notificationMode: 'separate', notificationY: 536,

      function formatDate(dateString) {

      function renderNotifications() {

      function positionText(value, min, max) { const r = (value - min) / (max - min); return r < .34 ? '위쪽' : r > .66 ? '아래쪽' : '중간'; }
      function syncPositionLabels() {

        ['.n-sender', '.n-message'].forEach(selector => {
          const input = $(selector, editor);
          if (!input) return;
          input.value = '';
          input.dispatchEvent(new Event('input', { bubbles: true }));

      }, 0);
    });
  }

  function compactStackHeights() {
    $$('.notification-stack').forEach(stack => {
      const backCount = $$('.stack-back', stack).length;
      stack.style.setProperty('min-height', `${92 + backCount * 5}px`, 'important');
    });
  }

  function replacePngExport() {
    const oldButton = $('#savePng');
    const phone = $('#phone');
    if (!oldButton || !phone) return;

    const button = oldButton.cloneNode(true);
    oldButton.replaceWith(button);

    const waitForImage = image => new Promise(resolve => {
      const source = image.getAttribute('src');

      /* Empty or hidden image slots must not block PNG export forever. */
      if (!source || image.complete) {
        resolve();
        return;
      }

      let settled = false;
      const done = () => {
        if (settled) return;
        settled = true;
        image.removeEventListener('load', done);
        image.removeEventListener('error', done);
        resolve();
      };

      image.addEventListener('load', done, { once: true });
      image.addEventListener('error', done, { once: true });
      window.setTimeout(done, 5000);
    });

    button.addEventListener('click', async () => {
      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = '저장 중…';

      try {
        if (!window.html2canvas) {
          throw new Error('html2canvas.min.js 파일을 찾을 수 없습니다. 해당 파일은 저장소에 그대로 유지해 주세요.');
        }

        await Promise.all($$('img', phone).map(waitForImage));
        document.body.classList.add('exporting');
        await new Promise(requestAnimationFrame);

        const canvas = await Promise.race([
          window.html2canvas(phone, {
            scale: 2,
            useCORS: true,
            backgroundColor: null,
            logging: false,
            imageTimeout: 8000,
            onclone: clonedDocument => {
              clonedDocument
                .querySelectorAll('.notification-card, .music-player')
                .forEach(card => {
                  card.style.backdropFilter = 'none';
                  card.style.webkitBackdropFilter = 'none';
                });
            }
          }),
          new Promise((_, reject) => {
            window.setTimeout(() => reject(new Error('PNG 생성 시간이 너무 오래 걸립니다. 이미지를 다시 업로드한 뒤 재시도해 주세요.')), 25000);
          })
        ]);

        const link = document.createElement('a');
        link.download = `screenstory-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        document.body.appendChild(link);
        link.click();
        link.remove();
      } catch (error) {
        alert(error?.message || 'PNG 저장 중 문제가 발생했습니다.');
      } finally {
        document.body.classList.remove('exporting');
        button.disabled = false;
        button.textContent = originalText || 'PNG 저장';
      }
    });
  }

  setHelpText();
  makeNewNotificationBlank();
  clearPhoneDefaults();
  compactStackHeights();

  const observer = new MutationObserver(compactStackHeights);
  const list = $('#notificationList');
  if (list) observer.observe(list, { childList: true, subtree: true });

  replacePngExport();
})();
</script>

<!-- ScreenStory v18 PNG export repair
Paste this ENTIRE block immediately BEFORE the FINAL </body> tag.
Keep it BELOW all older patches. This patch intercepts PNG saving first, so older
save handlers cannot keep the button stuck on “저장 중…”. -->

<style id="screenstory-v18-export-style">
  #savePng:disabled {
    opacity: .72;
    cursor: wait;
  }

  /* html2canvas captures the phone frame itself, including the black bezel. */
  .phone-frame.screenstory-exporting {
    box-shadow: none !important;
  }
</style>

<script>
(() => {
  if (window.__screenstoryV18ExportInstalled) return;
  window.__screenstoryV18ExportInstalled = true;

  const $ = (selector, root = document) => root.querySelector(selector);
  const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];

  const frame = $('.phone-frame');
  const phone = $('#phone');
  const saveButton = $('#savePng');

  if (!frame || !phone || !saveButton) return;

  /*
    The original page only fully initializes after an input event.
    Trigger a harmless render once on first load without changing any value.
  */
  function warmUpPreview() {
    const minuteInput = $('#minuteInput');
    if (!minuteInput) return;

    minuteInput.dispatchEvent(new Event('input', { bubbles: true }));
    requestAnimationFrame(() => {
      minuteInput.dispatchEvent(new Event('input', { bubbles: true }));
    });
  }

  function nextFrame() {
    return new Promise(resolve => requestAnimationFrame(() => resolve()));
  }

  function timeout(promise, ms, message) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error(message)), ms))
    ]);
  }

  async function waitForVisibleImages(root) {
    const images = $$('img', root).filter(image => {
      const src = image.currentSrc || image.getAttribute('src') || '';
      const style = getComputedStyle(image);
      return src.trim() && style.display !== 'none' && style.visibility !== 'hidden';
    });

    await Promise.all(images.map(async image => {
      try {
        if (image.decode) {
          await timeout(image.decode(), 3500, 'image decode timeout');
          return;
        }
      } catch (_) {
        /* A failed decode should never block downloading. */
      }

      if (!image.complete) {
        await new Promise(resolve => {
          const finish = () => resolve();
          image.addEventListener('load', finish, { once: true });
          image.addEventListener('error', finish, { once: true });
          setTimeout(finish, 3500);
        });
      }
    }));
  }

  function canvasToBlob(canvas) {
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if (blob) resolve(blob);
        else reject(new Error('PNG 파일을 만들지 못했습니다.'));
      }, 'image/png');
    });
  }

  async function exportFrame(button) {
    const originalLabel = button.dataset.screenstoryLabel || button.textContent || 'PNG 저장';
    button.dataset.screenstoryLabel = originalLabel;
    button.disabled = true;
    button.textContent = '저장 중…';

    try {
      if (!window.html2canvas) {
        throw new Error('html2canvas.min.js 파일을 찾지 못했습니다. 저장소 최상단에 해당 파일을 그대로 두어야 합니다.');
      }

      warmUpPreview();

      if (document.fonts && document.fonts.ready) {
        try {
          await timeout(document.fonts.ready, 2500, 'font timeout');
        } catch (_) {
          /* Font readiness should not stop exporting. */
        }
      }

      await nextFrame();
      await nextFrame();
      await waitForVisibleImages(phone);

      document.body.classList.add('exporting');
      frame.classList.add('screenstory-exporting');

      /*
        Capture .phone-frame, not #phone.
        That keeps the black outer bezel / rounded border in the downloaded PNG.
      */
      const canvas = await timeout(
        window.html2canvas(frame, {
          scale: 2,
          backgroundColor: null,
          useCORS: true,
          allowTaint: true,
          logging: false,
          imageTimeout: 5000,
          removeContainer: true,
          onclone: clonedDocument => {
            const clonedFrame = clonedDocument.querySelector('.phone-frame');
            if (clonedFrame) {
              clonedFrame.style.boxShadow = 'none';
              clonedFrame.style.overflow = 'hidden';
            }

            /* Prevent the old glass blur from creating a grid pattern in PNG. */
            clonedDocument
              .querySelectorAll('.notification-card, .music-player')
              .forEach(card => {
                card.style.backdropFilter = 'none';
                card.style.webkitBackdropFilter = 'none';
              });

            /* Do not let hidden/empty slots interfere with the capture. */
            clonedDocument.querySelectorAll('img').forEach(image => {
              const src = image.getAttribute('src') || '';
              if (!src.trim()) image.style.display = 'none';
            });
          }
        }),
        25000,
        'PNG 생성 시간이 너무 오래 걸립니다. 페이지를 새로고침한 뒤 다시 시도해 주세요.'
      );

      const blob = await timeout(
        canvasToBlob(canvas),
        7000,
        'PNG 파일을 준비하지 못했습니다.'
      );

      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `screenstory-${Date.now()}.png`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    } catch (error) {
      alert(error?.message || 'PNG 저장 중 문제가 발생했습니다.');
    } finally {
      document.body.classList.remove('exporting');
      frame.classList.remove('screenstory-exporting');
      button.disabled = false;
      button.textContent = originalLabel;
    }
  }

  /*
    Capture phase is deliberate:
    it runs before every older click listener added by previous patches,
    preventing them from starting a second export or hanging forever.
  */
  document.addEventListener('click', event => {
    const button = event.target.closest('#savePng');
    if (!button) return;

    event.preventDefault();
    event.stopImmediatePropagation();
    exportFrame(button);
  }, true);

  warmUpPreview();
})();
</script>
  
</body>
