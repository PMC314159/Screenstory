<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScreenStory — Character Lock Screen Maker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="page-header">
      <div>
        <p class="eyebrow">FICTIONAL PHONE MAKER · LOCK SCREEN</p>
        <h1>ScreenStory</h1>
      </div>
      <button class="save-button" id="savePng" type="button">PNG 저장</button>
    </header>

    <section class="workspace">
      <aside class="controls" aria-label="잠금화면 설정">
        <section class="panel-section">
          <div class="section-heading"><span>01</span><h2>배경화면</h2></div>
          <label class="upload-box" for="wallpaperInput">
            <input id="wallpaperInput" type="file" accept="image/png,image/jpeg,image/webp" hidden />
            <span class="upload-plus">＋</span>
            <strong>사진 업로드</strong>
            <small>JPG, PNG, WEBP</small>
          </label>
          <button class="text-button" id="resetWallpaper" type="button">기본 배경으로 되돌리기</button>
        </section>

        <section class="panel-section">
          <div class="section-heading"><span>02</span><h2>기본 정보</h2></div>
          <div class="row two">
            <label>시<input id="hourInput" type="number" min="0" max="23" value="7" /></label>
            <label>분<input id="minuteInput" type="number" min="0" max="59" value="8" /></label>
          </div>
          <label>날짜<input id="dateInput" type="date" value="2026-07-06" /></label>
          <label>통신사 / 왼쪽 표시 <input id="carrierInput" type="text" placeholder="예: Telekom.de" /></label>
          <label>배터리 <span id="batteryValue">83%</span><input id="batteryInput" type="range" min="1" max="100" value="83" /></label>
        </section>

        <section class="panel-section">
          <div class="section-heading"><span>03</span><h2>알림</h2><button class="round-add" id="addNotification" type="button" aria-label="알림 추가">＋</button></div>
          <p class="section-help">같은 앱 알림은 잠금화면에서 겹쳐진 스택 카드로 보임.</p>
          <label>알림 위치 <span id="notificationPositionValue">중간</span><input id="notificationPosition" type="range" min="180" max="700" value="360" /></label>
          <div id="notificationEditor" class="notification-editor"></div>
        </section>

        <section class="panel-section">
          <div class="section-heading"><span>04</span><h2>음악 재생 화면</h2></div>
          <label>표시 방식
            <select id="musicMode">
              <option value="none">표시 안 함</option>
              <option value="mini">아래쪽 플레이어만</option>
              <option value="full">앨범 커버 + 플레이어</option>
            </select>
          </label>
          <label class="upload-inline" for="albumInput">앨범 커버 업로드<input id="albumInput" type="file" accept="image/png,image/jpeg,image/webp" hidden /><span>파일 선택</span></label>
          <label>곡 제목<input id="songTitle" type="text" value="낭만 한도 초과" /></label>
          <label>아티스트<input id="songArtist" type="text" value="하이키" /></label>
          <div class="row two">
            <label>현재 시간<input id="songElapsed" type="text" value="1:08" /></label>
            <label>남은 시간<input id="songRemaining" type="text" value="−2:34" /></label>
          </div>
          <label>재생 진행률<input id="songProgress" type="range" min="0" max="100" value="37" /></label>
        </section>
      </aside>

      <section class="preview-column">
        <div class="preview-label">LIVE PREVIEW</div>
        <div id="phoneExport" class="phone-export">
          <div id="phone" class="phone">
            <div id="wallpaper" class="wallpaper"></div>
            <div class="wallpaper-tint"></div>

            <div class="status-row">
              <span id="carrierText" class="carrier-text"></span>
              <div class="dynamic-island"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.5 10V7a4.5 4.5 0 0 1 9 0v3"/><rect x="5.5" y="10" width="13" height="10" rx="2"/></svg></div>
              <div class="status-icons" aria-hidden="true">
                <svg class="signal" viewBox="0 0 24 24"><rect x="2" y="15" width="3" height="6" rx="1"/><rect x="7" y="11" width="3" height="10" rx="1"/><rect x="12" y="7" width="3" height="14" rx="1"/><rect x="17" y="3" width="3" height="18" rx="1"/></svg>
                <svg class="wifi" viewBox="0 0 24 24"><path d="M2.5 9.5a14.5 14.5 0 0 1 19 0"/><path d="M6 13a9.5 9.5 0 0 1 12 0"/><path d="M9.5 16.5a4.5 4.5 0 0 1 5 0"/><circle cx="12" cy="20" r="1.6"/></svg>
                <div class="battery-icon"><div id="batteryFill" class="battery-fill"></div></div>
              </div>
            </div>

            <div id="clockZone" class="clock-zone">
              <div id="dateText" class="date-text"></div>
              <div id="clockText" class="clock-text">7:08</div>
            </div>

            <div id="notificationLayer" class="notification-layer" aria-label="알림 영역">
              <div class="drag-hint">↕ 드래그해서 위치 조정</div>
              <div id="notificationStack"></div>
            </div>

            <div id="musicLayer" class="music-layer hidden"></div>

            <div class="bottom-actions" aria-hidden="true">
              <div class="quick-action flashlight-icon">
                <svg viewBox="0 0 32 32"><path d="M12 3h8l-1 8h-6l-1-8Zm0 10h8l-1 5v9H13v-9l-1-5Zm2 7h4v3h-4v-3Z"/></svg>
              </div>
              <div class="home-indicator"></div>
              <div class="quick-action camera-icon">
                <svg viewBox="0 0 32 32"><path d="M10 8 12 5h8l2 3h3a3 3 0 0 1 3 3v13a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V11a3 3 0 0 1 3-3h3Zm6 4a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13Zm0 3a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7Z"/></svg>
              </div>
            </div>
          </div>
        </div>
        <p class="preview-help">알림 영역을 드래그하거나 왼쪽 슬라이더로 위치를 바꿀 수 있음.</p>
      </section>
    </section>
  </main>

  <template id="notificationTemplate">
    <article class="notification-form">
      <div class="notification-title"><strong>알림 <span class="notification-number"></span></strong><button class="delete-notification" type="button">삭제</button></div>
      <label>앱
        <select class="notification-app">
          <option value="kakao">카카오톡</option>
          <option value="instagram">Instagram</option>
          <option value="messages">메시지</option>
          <option value="discord">Discord</option>
          <option value="phone">전화</option>
        </select>
      </label>
      <div class="phone-only hidden"><label>전화 알림 종류<select class="phone-kind"><option value="missed">부재중 전화</option></select></label></div>
      <label>보낸 사람 / 채널<input class="notification-sender" type="text" placeholder="예: 유안" /></label>
      <label>내용<textarea class="notification-message" rows="2" placeholder="예: 아직 안 잤어?"></textarea></label>
      <label>표시 시간<input class="notification-time" type="text" value="지금" /></label>
      <label class="app-icon-upload">커스텀 앱 아이콘<input class="notification-icon" type="file" accept="image/png,image/jpeg,image/webp" hidden /><span>이미지 선택</span></label>
    </article>
  </template>

  <script src="html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
